<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bell Pull — James&rsquo;s Carillon</title>
  <meta name="description" content="Pull the woolly sally to ring a big tower bell. Choose the bell size." />
  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <!-- Shared SVG gradients for the bell -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="bellGold" x1="0" y1="0" x2="0.35" y2="1">
        <stop offset="0" stop-color="#fff1c4" />
        <stop offset="0.35" stop-color="#e9b94f" />
        <stop offset="0.75" stop-color="#a06d27" />
        <stop offset="1" stop-color="#6b4215" />
      </linearGradient>
      <linearGradient id="bellLip" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7a4e1c" />
        <stop offset="1" stop-color="#3c2810" />
      </linearGradient>
      <radialGradient id="clapperGrad" cx="0.4" cy="0.35" r="0.7">
        <stop offset="0" stop-color="#caa45e" />
        <stop offset="1" stop-color="#4a3414" />
      </radialGradient>
    </defs>
  </svg>

  <div class="scene scene--pull">
    <!-- Tab bar: switch between the two instruments -->
    <nav class="tabs" aria-label="Choose instrument">
      <a class="tab" href="index.html">Carillon</a>
      <a class="tab is-active" href="ring.html" aria-current="page">Bell Pull</a>
    </nav>

    <div class="battlement" aria-hidden="true"></div>

    <div class="tower">
      <div class="pillar pillar--left" aria-hidden="true">
        <span class="slit"></span>
        <span class="slit"></span>
      </div>

      <div class="belfry belfry--pull">
        <div class="belfry__sky" id="sky" aria-hidden="true"></div>
        <div class="beam" aria-hidden="true"></div>

        <!-- The big bell, its rope and the woolly sally -->
        <div class="ringer" id="ringer">
          <div class="bigbell" id="bigbell"></div>
          <div class="sally" id="sally"></div>
        </div>

        <div class="belfry__arch" aria-hidden="true"></div>
      </div>

      <div class="pillar pillar--right" aria-hidden="true">
        <span class="slit"></span>
        <span class="slit"></span>
      </div>
    </div>

    <div class="base">
      <div class="nameplate">James&rsquo;s Carillon</div>
      <div class="controls">
        <div class="control">
          <label for="size">Bell size</label>
          <select id="size"></select>
        </div>
        <div class="control">
          <label for="vol">Volume</label>
          <input id="vol" type="range" min="0" max="100" value="80" />
        </div>
      </div>
      <p class="hint">Grab the woolly sally and pull down to ring the bell.</p>
    </div>
  </div>

  <script src="mood.js?v=2" defer></script>
  <script src="welcome.js?v=1" defer></script>
  <script src="pull.js?v=2" defer></script>
</body>
</html>
